[tools]
python = "3.12"

[env]
PLATFORMIO_CORE_DIR = "{{config_root}}/.pio"

[tasks.setup]
description = "Install PlatformIO CLI"
run = "pip install platformio"

[tasks.build]
description = "Build the project and update compile_commands.json"
run = ["pio run -e m5stack-core-esp32", "pio run -e m5stack-core-esp32 --target compiledb"]

[tasks.upload]
description = "Upload firmware to M5Stack"
run = "pio run -e m5stack-core-esp32 --target upload"

[tasks.monitor]
description = "Open serial monitor"
run = "pio device monitor"
